<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartVersa Admin Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0b1120 0%, #14532d 100%);
      height: 100vh; margin: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: #fff; padding: 40px 36px; border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25); width: 320px; text-align: center;
    }
    .logo { font-size: 22px; font-weight: 800; color: #128c3f; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: 13px; margin-bottom: 22px; }
    input {
      width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1;
      border-radius: 10px; margin: 8px 0; font-size: 15px;
    }
    input:focus { outline: none; border-color: #25d366; }
    button {
      width: 100%; padding: 12px; border: none; background: #25d366; color: #fff;
      border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 15px;
      margin-top: 10px;
    }
    button:hover { background: #1fb457; }
    .error { color: #dc2626; font-size: 13px; margin: 10px 0 0; min-height: 16px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">SmartVersa</div>
    <div class="sub">AI CRM · Admin Portal</div>
    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Username" autofocus required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Log in</button>
    </form>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
  </div>
</body>
</html>
